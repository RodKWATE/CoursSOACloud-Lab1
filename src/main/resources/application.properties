# ============================================================
# APPLICATION MOVESMART CARPOOLING – TP1 Configuration
# ============================================================

# Nom de l'application (visible dans les logs)
spring.application.name=movesmart-carpooling

# Port du serveur (8080 par défaut)
server.port=8080

# ============================================================
# BASE DE DONNÉES H2 (mémoire, parfaite pour les TPs)
# H2 est une base de données Java embarquée — aucune installation requise.
# Les données sont perdues à chaque redémarrage (comportement voulu en dev).
# ============================================================

# URL de connexion H2 en mémoire
spring.datasource.url=jdbc:h2:mem:carpoolingdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Pilote JDBC H2
spring.datasource.driver-class-name=org.h2.Driver

# Identifiants H2 (par défaut)
spring.datasource.username=sa
spring.datasource.password=

# Activer la console web H2 — accessible à http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / HIBERNATE
# ============================================================

# Dialecte SQL adapté à H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop : crée le schéma au démarrage, le supprime à l'arrêt
# Autres options : validate, update, create, none
spring.jpa.hibernate.ddl-auto=create-drop

# Afficher les requêtes SQL générées dans les logs (très utile pour apprendre)
spring.jpa.show-sql=true

# Formater les requêtes SQL dans les logs pour les rendre lisibles
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT : permet à Spring de charger data.sql APRÈS que Hibernate a créé les tables
spring.jpa.defer-datasource-initialization=true

# ============================================================
# INITIALISATION DES DONNÉES
# Spring Boot exécute automatiquement src/main/resources/data.sql au démarrage
# ============================================================
spring.sql.init.mode=always

# ============================================================
# SPRINGDOC OPENAPI / SWAGGER
# ============================================================

# Chemin de la spécification OpenAPI (JSON)
springdoc.api-docs.path=/v3/api-docs

# Chemin de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Trier les endpoints par méthode HTTP dans Swagger UI
springdoc.swagger-ui.operations-sorter=method

# ============================================================
# LOGS
# ============================================================

# Niveau de log pour notre package (DEBUG pour voir plus de détails)
logging.level.com.movesmart.carpooling=DEBUG

# Niveau de log Hibernate (affiche les requêtes avec paramètres)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
